name: DATG Cloud Simulation Engine

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

# 🔥 IMPORTANT: Giving the cloud server write access to push changes back to repo
permissions:
  contents: write

jobs:
  run-simulation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install ML Dependencies
      run: pip install pandas scikit-learn joblib

    # STEP 1: Run Simulation & Generate CSV Data
    - name: Execute Traffic Simulator (Data Generation)
      run: python simulation.py

    # STEP 2: Train the AI Brain using the generated CSV
    - name: Train AI Brain
      run: python ai_brain.py

    # STEP 2.5: Re-run simulation with AI Active
    - name: Run AI-Powered Inference Simulation
      run: python simulation.py

    # STEP 3: Generate HTML Dashboard & Dynamic README
    - name: Generate UI Dashboard & Documentation
      run: python generate_dashboard.py

    # 🔥 STEP 4: Automated Git Commit and Push back to GitHub
    - name: Commit and Push Updated Documentation
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        # [skip ci] is used so it doesn't trigger an infinite loop of workflows
        git commit -m "docs: auto-update live cloud metrics [skip ci]" || echo "No changes to commit"
        git push

    # STEP 5: Extract Dataset, AI Model, and the HTML Web Dashboard
    - name: Upload DATG Artifacts (Dataset, Model & UI)
      uses: actions/upload-artifact@v4
      with:
        name: datg-system-artifacts
        path: |
          traffic_telemetry.csv
          ai_model.pkl
          dashboard.html
          
