name: DATG Cloud Simulation Engine

# Trigger automatically on push or manual button click
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  run-simulation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # SYSTEM UPGRADE: Installing Neural Network Dependencies
    - name: Install ML Dependencies
      run: pip install pandas scikit-learn joblib

    # STEP 1: Run Simulation & Generate CSV Data
    - name: Execute Traffic Simulator (Data Generation)
      run: python simulation.py

    # STEP 2: Train the AI Brain using the generated CSV
    - name: Train AI Brain
      run: python ai_brain.py
    # STEP 2.5: Re-run simulation now that AI model exists to test inference
    - name: Run AI-Powered Inference Simulation
      run: python simulation.py
      

    # STEP 3: Extract both Dataset and the trained AI Model
    - name: Upload DATG Artifacts (Dataset & Model)
      uses: actions/upload-artifact@v4
      with:
        name: datg-system-artifacts
        path: |
          traffic_telemetry.csv
          ai_model.pkl
          
